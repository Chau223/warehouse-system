<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码领用</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f5f7fa;
    padding: 24px;
    display: flex; justify-content: center;
  }
  .card {
    max-width: 500px;
    width: 100%;
  }
  .hint {
    font-size: 17px;
    color: #e74c3c;
    margin-bottom: 22px;
    line-height: 2;
    text-align: left;
    padding: 16px 20px;
    background: #fff5f5;
    border-left: 4px solid #e74c3c;
    border-radius: 8px;
  }
  .qrcode-wrapper {
    display: flex; justify-content: center;
    background: #fff;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    margin-bottom: 18px;
  }
  .qrcode-wrapper canvas,
  .qrcode-wrapper img {
    display: block;
    width: 180px !important;
    height: 180px !important;
  }
  .url-text {
    font-size: 12px;
    color: #7f8c8d;
    word-break: break-all;
    text-align: center;
    margin-bottom: 12px;
  }
  .footer {
    text-align: center;
    font-size: 12px;
    color: #bdc3c7;
    margin-top: 12px;
  }
  @media print {
    body { background: #fff; padding: 0; }
    .card { box-shadow: none; }
    .url-text { display: none; }
    .footer { display: none; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="hint">
    ⚠️ 请严格扫码领用，领用必扫<br>
    📋 扫码自动记录，库存数据清晰可查<br>
    📦 库存不足时会及时补货，不耽误使用<br>
    ⛔ 若不扫码直接取用，数据对不上<br>
    大家急用时可能无法及时拿到物资
  </div>

  <div class="qrcode-wrapper">
    <div id="qrcode"></div>
  </div>

  <div class="footer">
    打印时间: <span id="printTime"></span>
  </div>
</div>

<script>
  const CLOUD_URL = 'https://chau223.github.io/warehouse-system/';
  document.getElementById('printTime').textContent = new Date().toLocaleString('zh-CN');

  new QRCode(document.getElementById('qrcode'), {
    text: CLOUD_URL,
    width: 180,
    height: 180,
    colorDark: '#2c3e50',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
